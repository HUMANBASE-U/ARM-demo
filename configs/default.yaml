seed: 42
device: cuda

data:
  data_dir: data/raw
  image_size: 64
  val_ratio: 0.1
  batch_size: 64
  num_workers: 4

model:
  latent_dim: 128
  action_dim: null
  hidden_dim: 256

train:
  epochs: 80
  lr: 0.001
  weight_decay: 0.00001
  grad_clip: 1.0
  lambda_recon: 1.0
  lambda_pred: 1.0
  lambda_latent: 0.25
  lambda_reward: 0.1
  lambda_done: 0.1
  save_name: world_model

eval:
  vis_interval: 1
  rollout_horizon: 20
